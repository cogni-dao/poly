# Per-node secrets catalog — node-domain (single-node-scope).
#
# Declare the SHAPE of each A2 secret this node's app consumes; NEVER the value.
# `service:` auto-resolves to this node's slug, so each key lands at
# OpenBao `cogni/<env>/<slug>/<KEY>` and fans out ONLY to this node's pod.
#
# The VALUE is written separately — see docs/guides/add-secret.md §3:
#   - self-serve: POST /api/v1/nodes/<id>/secrets  (node-owner, OpenFGA-gated, API key only)
#   - ops:        pnpm secrets:set <env> <slug> <KEY>
#
# This file ships empty. Add entries as your node needs them, e.g.:
#
# secrets:
#   - name: MY_VENDOR_API_KEY
#     tier: A2
#     appliesTo: web
#     shared: false
#     source: human
#     required: true
#     category: "Vendor Name"
#     description: One line describing what consumes this key.
#     steps:
#       - "Create the key in the vendor dashboard."

secrets:
  - name: PRIVY_USER_WALLETS_APP_ID
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "Privy User Wallets"
    description: Dedicated Privy app id for per-tenant Polymarket trading wallets.
    steps:
      - "Create or reuse the dedicated Privy user-wallets app; do not use the operator-wallet Privy app."
      - "Set this value for environments where tenant trading wallets should be enabled."
  - name: PRIVY_USER_WALLETS_APP_SECRET
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "Privy User Wallets"
    description: Dedicated Privy app secret for provisioning tenant Polymarket trading wallets.
    steps:
      - "Create or reuse the dedicated Privy user-wallets app; do not use the operator-wallet Privy app."
      - "Set this value for environments where tenant trading wallets should be enabled."
  - name: PRIVY_USER_WALLETS_SIGNING_KEY
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "Privy User Wallets"
    description: Dedicated Privy signing key used for server-side tenant wallet actions.
    steps:
      - "Create or reuse the dedicated Privy user-wallets app; do not use the operator-wallet Privy app."
      - "Set this value for environments where tenant trading wallets should be enabled."
  - name: POLY_WALLET_AEAD_KEY_HEX
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "Poly Wallet Encryption"
    description: AES-256-GCM key, as 64 hex characters, for encrypting per-tenant Polymarket CLOB credentials.
    steps:
      - "Generate a 32-byte random key and store it as exactly 64 hex characters."
      - "Rotate together with POLY_WALLET_AEAD_KEY_ID when introducing a new encryption key."
  - name: POLY_WALLET_AEAD_KEY_ID
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "Poly Wallet Encryption"
    description: Identifier stamped on encrypted tenant Polymarket CLOB credential rows.
    steps:
      - "Set to a short stable id for the active POLY_WALLET_AEAD_KEY_HEX value."
      - "Change when rotating the active wallet credential encryption key."
  - name: POLYGON_RPC_URL
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "Polygon RPC"
    description: Polygon RPC endpoint used for tenant wallet balances, approvals, withdrawals, and CLOB credential derivation.
    steps:
      - "Use a Polygon mainnet RPC endpoint suitable for server-side wallet operations."
      - "Treat vendor-key-bearing RPC URLs as secret values."
  - name: POLY_CLOB_GEO_BLOCK_TOKEN
    tier: A2
    appliesTo: web
    shared: false
    source: human
    required: false
    category: "Polymarket CLOB"
    description: Optional upstream token used when deriving or rotating Polymarket CLOB API credentials through restricted network paths.
    steps:
      - "Set only when the deployment needs a Polymarket CLOB geo-block bypass token."
